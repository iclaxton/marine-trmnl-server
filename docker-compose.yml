services:
  marine-trmnl-server:
    build: .
    # For Raspberry Pi, add: platform: linux/arm64
    ports:
      - "3002:3002"
    env_file:
      - .env                        # provides INFLUXDB_TOKEN and other secrets
    # On Linux, 'localhost' inside the container is the container itself, not the Pi.
    # This adds host.docker.internal → host gateway so INFLUXDB_URL can use it.
    # e.g. set INFLUXDB_URL=http://host.docker.internal:8086 in .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config.yaml:/app/config.yaml:ro   # edit locally, read-only in container
      - ./screens:/app/screens              # generated images
      - ./data:/app/data                    # device registry (devices.json)
    restart: unless-stopped
