name: Docker

on:
  push:
    tags: ['v*.*.*']
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # For branch pushes: only run when the CI workflow completed successfully.
    # For tag pushes: github.event_name == 'push', so the condition is always true.
    if: github.event_name == 'push' || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # QEMU lets the builder produce arm64 images on an x86 runner (for Pi).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Log in to GitHub Container Registry using the automatic GITHUB_TOKEN.
      # No extra secrets required.
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Also push to Docker Hub.
      # Requires DOCKERHUB_TOKEN repository secret (Settings → Secrets → Actions).
      # Skipped automatically if the secret is not configured.
      - name: Check Docker Hub token
        id: dockerhub_check
        run: |
          if [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "enabled=true"  >> $GITHUB_OUTPUT
            echo "image=docker.io/klaxian/marine-trmnl-server" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "image="        >> $GITHUB_OUTPUT
          fi
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.dockerhub_check.outputs.enabled == 'true'
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: klaxian
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Generate image tags:
      #   push to main  → :latest + :sha-<short>
      #   push tag v1.2 → :1.2 + :latest + :sha-<short>
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ steps.dockerhub_check.outputs.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in the GitHub Actions cache to speed up rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Push README.md as the Docker Hub repository overview.
      # Only runs when DOCKERHUB_TOKEN is configured.
      - name: Update Docker Hub description
        if: steps.dockerhub_check.outputs.enabled == 'true'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: klaxian
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: klaxian/marine-trmnl-server
          readme-filepath: ./README.md
